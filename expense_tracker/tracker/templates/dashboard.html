{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4 fw-bold">Dashboard</h2>

<!-- SUMMARY CARDS -->
<div class="row g-4 mb-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <h6 class="text-muted">Total Income</h6>
                <h3 class="text-success fw-bold">Rs {{ income }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <h6 class="text-muted">Total Expense</h6>
                <h3 class="text-danger fw-bold">Rs {{ expense }}</h3>
            </div>
        </div>
    </div>
</div>

<!-- CHART CARD -->
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h5 class="text-center mb-3">Expense by Category</h5>
                <canvas id="expenseChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- SAFE JSON DATA -->
{{ labels|json_script:"labels-data" }}
{{ data|json_script:"chart-data" }}

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = JSON.parse(
        document.getElementById('labels-data').textContent
    );

    const data = JSON.parse(
        document.getElementById('chart-data').textContent
    );

    const ctx = document.getElementById('expenseChart').getContext('2d');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: [
                    '#4CAF50',
                    '#FF6384',
                    '#36A2EB',
                    '#FFCE56',
                    '#9C27B0'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
</script>

{% endblock %}
