{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Expense Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #f8f9fa, #eef1f5);
      font-family: 'Segoe UI', sans-serif;
    }
    .card { animation: fadeIn 0.4s ease-in; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .btn-min { min-height: 44px; min-width: 44px; }
    body { overflow-x: hidden; }
  </style>
</head>
<body class="bg-light">
  <!-- Top Bar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'dashboard' %}">ExpenseTracker</a>
      <div class="d-flex align-items-center">
        <button id="themeToggle" class="btn btn-outline-light btn-sm me-2 btn-min">🌓</button>
        <button class="btn btn-outline-light btn-sm d-lg-none btn-min" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas" aria-controls="sidebarOffcanvas">
          ☰
        </button>
      </div>
    </div>
  </nav>

  <!-- Sidebar for desktop -->
  <div class="d-none d-lg-block" id="sidebarDesktop" style="position:fixed; top:56px; bottom:0; width:200px; background:#343a40; color:#fff;">
    {% include "_sidebar.html" %}
  </div>

  <!-- Offcanvas Sidebar for mobile -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="sidebarOffcanvasLabel">Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body p-0">
      {% include "_sidebar.html" %}
    </div>
  </div>

  <!-- Main Content -->
  <div class="container-fluid" style="margin-left:0; padding-top:1rem;">
    <div class="row">
      <div class="col-lg-2 d-none d-lg-block"></div>
      <div class="col-lg-10 offset-lg-2" style="margin-left:200px;">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div aria-live="polite" aria-atomic="true" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
    {% for message in messages %}
      <div class="toast align-items-center text-white bg-{{ message.tags }} border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
        <div class="d-flex">
          <div class="toast-body">{{ message }}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    {% endfor %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const htmlEl = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    htmlEl.setAttribute('data-bs-theme', savedTheme);
    themeToggle.innerText = savedTheme === 'dark' ? '☀️' : '🌓';
    themeToggle.addEventListener('click', () => {
      const current = htmlEl.getAttribute('data-bs-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeToggle.innerText = newTheme === 'dark' ? '☀️' : '🌓';
    });
    document.addEventListener('DOMContentLoaded', function () {
      const toastElList = [].slice.call(document.querySelectorAll('.toast'));
      const toastList = toastElList.map(function (toastEl) { return new bootstrap.Toast(toastEl); });
      toastList.forEach(toast => toast.show());
    });
  </script>
</body>
</html>
