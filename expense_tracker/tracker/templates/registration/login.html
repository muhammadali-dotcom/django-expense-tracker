{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – Expenzo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'tracker/css/auth.css' %}">
  <link rel="icon" type="image/png" href="{% static 'tracker/images/logo-icon.png' %}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="brand-icon"><img src="{% static 'tracker/images/logo-icon.png' %}" alt="Expenzo logo"></div>
      <h1>Expenzo</h1>
      <p>Smart settlements for everyone</p>
    </div>
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to continue to your dashboard</p>

      {% if form.errors %}
        <div class="alert-error">
          <i class="bi bi-exclamation-circle-fill"></i>
          Invalid username or password. Please try again.
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_username" class="form-label">Username</label>
          <div class="input-icon-wrap">
            <i class="bi bi-person"></i>
            <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label for="id_password" class="form-label">Password</label>
          <div class="input-icon-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-submit">
          Sign In <i class="bi bi-arrow-right"></i>
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a><br>
      <a href="{% url 'password_reset' %}">Forgot your password?</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
