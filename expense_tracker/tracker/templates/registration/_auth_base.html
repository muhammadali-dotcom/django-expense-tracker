{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Expenzo{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'tracker/css/auth.css' %}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="brand-icon"><i class="bi bi-people-fill"></i></div>
      <h1>Expenzo</h1>
    </div>
    <div class="auth-card">
      {% block auth_content %}{% endblock %}
    </div>
    <div class="auth-footer">{% block auth_footer %}<a href="{% url 'login' %}">Back to sign in</a>{% endblock %}</div>
  </div>
</body>
</html>
